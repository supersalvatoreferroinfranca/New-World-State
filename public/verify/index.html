    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://newworldstate.org/" />
    <meta property="og:title" content="NWS 1.0 | Registro Mondiale della Cittadinanza" />
    <meta property="og:description" content="Unisciti alla comunità mondiale digitale. Registrazione ufficiale dei cittadini del New World State." />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://newworldstate.org/" />
    <meta property="twitter:title" content="NWS 1.0 | Registro Mondiale della Cittadinanza" />
    <meta property="twitter:description" content="Unisciti alla comunità mondiale digitale. Registrazione ufficiale dei cittadini del New World State." />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Structured Data (JSON-LD) for SEO -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "New World State Authority",
      "url": "https://newworldstate.org/",
      "logo": "https://newworldstate.org/logo.png",
      "description": "Una piattaforma per la gestione di una comunità mondiale organizzata come uno stato sovrano digitale."
    }
    </script>
    <!-- Fallback static form for Cloudflare Pages Static Forms Plugin detection -->
    <form name="richiesta-cittadinanza" data-static-form-name="richiesta-cittadinanza" method="POST" style="display: none;">
      <input type="text" name="surname" />
      <input type="text" name="firstName" />
      <input type="text" name="gender" />
      <input type="text" name="birthDate" />
      <input type="text" name="birthPlace" />
      <input type="text" name="birthCountry" />
      <input type="text" name="citizenship" />
      <input type="text" name="maritalStatus" />
      <input type="text" name="residenceAddress" />
      <input type="text" name="residenceNumber" />
      <input type="text" name="residenceZip" />
      <input type="text" name="residenceCity" />
      <input type="text" name="residenceProvince" />
      <input type="text" name="residenceCountry" />
      <input type="email" name="email" />
      <input type="text" name="phonePrefix" />
      <input type="text" name="phoneNumber" />
      <input type="text" name="plusCode" />
      <input type="text" name="locationDescription" />
      <input type="text" name="isAmbassador" />
      <input type="text" name="isPeacekeeper" />
    </form>
  </body>
</html>
